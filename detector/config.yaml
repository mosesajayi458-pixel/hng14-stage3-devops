log_file: "/var/log/nginx/hng-access.log"

slack_webhook_url: "REPLACE_WITH_YOUR_SLACK_WEBHOOK"

thresholds:
  zscore: 3.0
  multiplier: 5.0
  error_multiplier: 3.0

baseline:
  window_minutes: 30
  recalc_interval_seconds: 60

unban_schedule_minutes: [10, 30, 120]

dashboard:
  host: "0.0.0.0"
  port: 5000
