version: "3.9"

services:
  nextcloud:
    image: kefaslungu/hng-nextcloud
    container_name: nextcloud
    restart: always
    volumes:
      - nextcloud_data:/var/www/html
      - HNG-nginx-logs:/var/log/nginx:ro
    networks:
      - hngnet

  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - HNG-nginx-logs:/var/log/nginx
    depends_on:
      - nextcloud
    networks:
      - hngnet

  detector:
    build: ./detector
    container_name: detector
    restart: always
    volumes:
      - HNG-nginx-logs:/var/log/nginx:ro
    cap_add:
      - NET_ADMIN
    ports:
      - "5000:5000"
    networks:
      - hngnet

volumes:
  nextcloud_data:
  HNG-nginx-logs:

networks:
  hngnet:
